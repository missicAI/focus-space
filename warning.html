<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Space Warning</title>
    <style>
      :root {
        color: #ffffff;
        background: transparent;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        display: grid;
        place-items: center;
        background: rgba(4, 12, 15, 0.72);
        backdrop-filter: blur(8px);
      }

      .warning-card {
        width: min(620px, calc(100vw - 56px));
        padding: 38px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 26px;
        background:
          radial-gradient(circle at top right, rgba(250, 204, 21, 0.2), transparent 36%),
          linear-gradient(135deg, rgba(15, 33, 38, 0.96), rgba(18, 29, 47, 0.96));
        text-align: center;
        box-shadow: 0 35px 120px rgba(0, 0, 0, 0.5);
      }

      .warning-icon {
        display: grid;
        place-items: center;
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 18px;
        color: #111827;
        background: #facc15;
        font-size: 32px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 36px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #d6e7ea;
        font-size: 18px;
      }

      strong {
        color: #ffffff;
      }

      .countdown-pill {
        width: fit-content;
        margin: 24px auto 14px;
        padding: 10px 18px;
        border-radius: 999px;
        color: #111827;
        background: #facc15;
        font-size: 18px;
        font-weight: 850;
      }

      .countdown-pill.danger {
        color: #ffffff;
        background: #e11d48;
      }

      .warning-progress {
        overflow: hidden;
        height: 11px;
        margin: 12px 0 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .warning-progress span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #5eead4, #facc15);
        transition: width 0.25s ease;
      }

      small {
        display: block;
        color: #dcecee;
        font-size: 15px;
      }

      button {
        height: 40px;
        margin-top: 20px;
        padding: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        color: #e8f6f7;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
        font: inherit;
      }

      body.strict .warning-card,
      body.locked .warning-card {
        border-color: rgba(244, 63, 94, 0.42);
        background:
          radial-gradient(circle at top right, rgba(244, 63, 94, 0.22), transparent 36%),
          linear-gradient(135deg, rgba(32, 10, 20, 0.96), rgba(18, 29, 47, 0.96));
      }

      body.strict .warning-icon,
      body.locked .warning-icon {
        color: #ffffff;
        background: #e11d48;
      }
    </style>
  </head>
  <body>
    <main class="warning-card">
      <div class="warning-icon">!</div>
      <h1 id="message">Bạn đang rời khỏi vùng học tập</h1>
      <p>Quay lại app/link của môn <strong id="subject">môn học</strong>.</p>
      <div id="countdown" class="countdown-pill">Đang cảnh báo</div>
      <div class="warning-progress">
        <span id="progress"></span>
      </div>
      <small id="detail">Quay lại vùng học để tiếp tục tính giờ học sâu.</small>
      <button id="hideButton" type="button">Ẩn cảnh báo</button>
    </main>

    <script>
      const fallback = {
        subject: "môn học",
        message: "Bạn đang rời khỏi vùng học tập",
        detail: "Quay lại vùng học để tiếp tục tính giờ học sâu.",
        remainingSeconds: 10,
        graceSeconds: 10,
        lockMode: "normal",
      };

      const elements = {
        message: document.getElementById("message"),
        subject: document.getElementById("subject"),
        countdown: document.getElementById("countdown"),
        progress: document.getElementById("progress"),
        detail: document.getElementById("detail"),
        hideButton: document.getElementById("hideButton"),
      };

      function renderWarning(payload) {
        const data = { ...fallback, ...(payload || {}) };
        const remainingSeconds = Number(data.remainingSeconds) || 0;
        const graceSeconds = Math.max(1, Number(data.graceSeconds) || 1);
        const progress = Math.max(8, Math.min(100, (remainingSeconds / graceSeconds) * 100));

        document.body.className = data.lockMode || "normal";
        elements.message.textContent = data.message || fallback.message;
        elements.subject.textContent = data.subject || fallback.subject;
        elements.detail.textContent = data.detail || fallback.detail;
        elements.progress.style.width = `${progress}%`;

        if (remainingSeconds > 0) {
          elements.countdown.className = "countdown-pill";
          elements.countdown.textContent = `Còn ${remainingSeconds}s để quay lại`;
        } else {
          elements.countdown.className = "countdown-pill danger";
          elements.countdown.textContent = "Đã tính là mất tập trung";
        }

        elements.hideButton.style.display = data.lockMode === "normal" ? "inline-block" : "none";
      }

      renderWarning(fallback);

      elements.hideButton.addEventListener("click", () => {
        window.__TAURI__?.core?.invoke("hide_warning_window").catch(() => undefined);
      });

      window.__TAURI__?.event
        ?.listen("warning-update", (event) => {
          renderWarning(event.payload);
        })
        .catch(() => undefined);
    </script>
  </body>
</html>
